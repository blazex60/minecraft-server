services:
  mc:
    container_name: mc
    image: itzg/minecraft-server@sha256:7e71de1b69aedcc0d74f0126251802d28fe3a71feb5cde6f0ff545fbdb77274f
    tty: true
    stdin_open: true
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "1.21.11"
      LEVEL: "lobby"
      MEMORY: "2048M"
      MAX_PLAYERS: "30"
      USE_AIKAR_FLAGS: "true"
      USE_MEOWICE_FLAGS: "true"
      ENABLE_COMMAND_BLOCK: "true"
      TZ: "Asia/Tokyo"
      OPS: "${MC_OPS}"
      PLAYER_IDLE_TIMEOUT: "300"
      MANAGEMENT_SERVER_ENABLED: "false"
      RCON_PASSWORD: "${RCON_PASSWORD}"
    ports:
      - "127.0.0.1:25565:25565"
      - "${TAILSCALE_IP}:25575:25575"
    volumes:
      - "./data:/data"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped

  # =================================================== #
  #   Backup container service for Minecraft            #
  # =================================================== #
  backups:
    container_name: mc_backup
    image: itzg/mc-backup@sha256:187904cef15de10f5f4241376442e51edee427de13f3378226511c733e2f138d
    depends_on:
      mc:
        condition: service_healthy
    environment:
      TZ: "Asia/Tokyo"
      RCON_HOST: mc
      RCON_PASSWORD: "${RCON_PASSWORD}"
      BACKUP_INTERVAL: "12h"
      INITIAL_DELAY: "2m"
      DEST_DIR: /backups
      SRC_DIR: /data
      BACKUP_METHOD: tar
      PRUNE_BACKUPS_DAYS: "14"
    volumes:
      - ./data:/data:ro
      - ./backups:/backups
    restart: unless-stopped

  netdata:
    container_name: mc_netdata
    image: netdata/netdata:latest
    hostname: mc-server
    ports:
      - "${TAILSCALE_IP}:19999:19999"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    restart: unless-stopped

  playit:
    image: ghcr.io/playit-cloud/playit-agent@sha256:84d8ea84529ae9ac6a4c9463033e0b7d29c1e6cc8311897bd2df0cb1a7af06f6
    network_mode: host
    depends_on:
      - mc
    environment:
      SECRET_KEY: "${PLAYIT_SECRET}"
      RUST_LOG: "warn"
    restart: unless-stopped
